name: CI

# Runs the checks that already exist in the repo (lint, type-check, unit tests)
# on every PR and on pushes to the long-lived branches. This is the enforcement
# gate that turns the existing ESLint boundary rules, strict TypeScript, and
# Vitest suite from "available" into "required".
on:
  pull_request:
  push:
    branches: [main, development]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit --pretty false

      # Unit + integration-excluded suite only. `npm run test` also runs
      # *.integration.test.* which hit real network/servers and are not
      # hermetic, so they are intentionally not part of the CI gate.
      - name: Unit tests
        run: npm run test:unit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Advisory for now: the harness + hermetic specs run, but a few financial
    # e2e specs are still being aligned with recently-refactored UI. Runs on
    # every PR for visibility without blocking merges. Remove this line to make
    # e2e a hard gate once the suite is green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # The backend-backed spec (auth-refresh) self-skips without E2E_* creds;
      # every other spec stubs `/api/backend/**` in-browser, so the suite runs
      # hermetically here. Playwright's webServer config builds output via
      # `npm run start`, so build first.
      - name: Build
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
